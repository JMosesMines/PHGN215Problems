<!-- Mount point for the TikZ script -->
<div>

  <button id="render">Render</button>
</div>
<div id="mount"></div>

<div class="card">
    <h2 id="problem-title">Loading...</h2>
    <p id="problem-text"></p>

    <!-- This is where the SVG will eventually appear -->
    <div id="tikz-mount"></div>
    <div id="status">Waiting for engine...</div>

    <div class="controls">
        <button onclick="changeProblem(-1)" id="prevBtn">Previous</button>
        <button onclick="changeProblem(1)" id="nextBtn">Next</button>
    </div>
</div>

<script>
(async () => {
  // 1) Load circuits
  const res = await fetch('data.json');
  const { circuits } = await res.json();

  // 2) Populate dropdown
  const pick = document.getElementById('pick');
  Object.keys(circuits).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    pick.appendChild(opt);
  });

  // 3) Render helper: inject TikZ, then load tikzjax.js so autostart runs
  function renderCircuit(name) {
    const lines = circuits[name];
    const tikz = [
      '\\usepackage{circuitikz}',
      '\\tikzset{ohm/.style={insert path={',
      '  +(-0.15,0) -- +(-0.05,0) arc (180:0:0.05) -- +(0.15,0)',
      '}}}',
      '\\begin{document}',
      '\\begin{circuitikz}[american]',
      ...lines,
      '\\end{circuitikz}',
      '\\end{document}'
    ].join('\n');

    // Clear prior content
    const mount = document.getElementById('mount');
    mount.innerHTML = '';

    // Inject TikZ first
    const s = document.createElement('script');
    s.type = 'text/tikz';
    s.textContent = tikz;
    mount.appendChild(s);

    // Then load tikzjax.js (autostart). Use a cache-buster so it executes each time.
    const t = document.createElement('script');
    t.src = 'tikzjax.js?cb=' + Date.now();
    document.head.appendChild(t);
  }

  function changeProblem(direction) {
      currentIndex += direction;
      renderProblem(currentIndex);
  }  
  
  // 4) First render (default = first option)
  renderCircuit(pick.value || Object.keys(circuits)[0]);

  // 5) Re-render on click
  document.getElementById('render').addEventListener('click', () => {
    renderCircuit(pick.value);
  });
})();
</script>
  
</body>
