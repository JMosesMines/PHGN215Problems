<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>TikZJax + JSON demo</title>

  <!-- Tell TikZJax where your assets are -->
  <script>
    window.TikZJaxConfig = {
      assets: { wasm: 'tex.wasm.gz', core: 'core.dump.gz' }
    };
  </script>

  <!-- TikZJax runtime (your built bundle) -->
  <script src="tikzjax.js"></script>

  <style>
    body { font-family: system-ui, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .demo { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>TikZJax from JSON</h1>

  <!-- Placeholder where we'll inject the TikZ script tag -->
  <div id="tikz-mount"></div>

<!-- TEMP test: static TikZ block -->
<script type="text/tikz">
  \usepackage{circuitikz}
  \begin{document}
  \begin{circuitikz}[american]
    \draw (0,0) to[battery1,l=$V$] (0,3)
          to[R=$R_1$] (3,3)
          to[R=$R_2$] (3,0) -- (0,0);
  \end{circuitikz}
  \end{document}
</script>

<script>
  // Run only after TikZJax has fully loaded its WASM + core
  window.addEventListener('tikzjax-load-finished', () => {
    fetch('data.json')
      .then(r => r.json())
      .then(({ circuit_lines }) => {
        const tikz = [
          '\\usepackage{circuitikz}',
          '\\begin{document}',
          '\\begin{circuitikz}[american]',
          ...circuit_lines,
          '\\end{circuitikz}',
          '\\end{document}'
        ].join('\n');

        const s = document.createElement('script');
        s.type = 'text/tikz';
        s.textContent = tikz;
        document.getElementById('tikz-mount').appendChild(s);

        // Now ask TikZJax to process the newly added script
        if (window.TikZJax && window.TikZJax.process) {
          window.TikZJax.process(document);
        }
      })
      .catch(err => console.error('Failed to load data.json', err));
  });
</script>
</body>
</html>
