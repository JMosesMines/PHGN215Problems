<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>TikZJax + JSON demo</title>

  <!-- Tell TikZJax where your assets are -->
  <script>
    window.TikZJaxConfig = {
      assets: { wasm: 'tex.wasm.gz', core: 'core.dump.gz' }
    };
  </script>

<!-- Put this BEFORE loading tikzjax.js -->
<script>window.TikZJaxNoAutostart = true;</script>

  <!-- TikZJax runtime (your built bundle) -->
  <script src="tikzjax.js"></script>

  <style>
    body { font-family: system-ui, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .demo { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>TikZJax from JSON</h1>

  <!-- Placeholder where we'll inject the TikZ script tag -->
  <div id="tikz-mount"></div>

  
<script>
  // Run exactly once after TikZJax finishes loading
  window.addEventListener('tikzjax-load-finished', () => {
    fetch('data.json')
      .then(r => r.json())
      .then(({ circuit_lines }) => {
        const tikz = [
          '\\usepackage{circuitikz}',
          '\\begin{document}',
          '\\begin{circuitikz}[american]',
          ...circuit_lines,
          '\\end{circuitikz}',
          '\\end{document}'
        ].join('\n');

        const mount = document.getElementById('tikz-mount');
        mount.innerHTML = '';                 // prevent duplicates
        const s = document.createElement('script');
        s.type = 'text/tikz';
        s.textContent = tikz;
        mount.appendChild(s);

        // Process ONLY the mount subtree (not the whole document)
        if (window.TikZJax?.process) {
          window.TikZJax.process(mount);
        }
      })
      .catch(err => console.error('Failed to load data.json', err));
  }, { once: true }); // <- ensures the handler runs only once
</script>
</body>
</html>
