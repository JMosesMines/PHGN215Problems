<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>TikZJax + JSON demo</title>

  <!-- Tell TikZJax where your assets are -->
  <script>
    window.TikZJaxConfig = {
      assets: { wasm: 'tex.wasm.gz', core: 'core.dump.gz' }
    };
  </script>

  <style>
    body { font-family: system-ui, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .demo { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>TikZJax from JSON</h1>

  <!-- Placeholder where we'll inject the TikZ script tag -->
  <div id="tikz-mount"></div>

  

<script>
  console.log('[setup] installing tikzjax-load-finished listener');
  window.addEventListener('tikzjax-load-finished', () => {
    console.log('[event] tikzjax-load-finished fired');
  }, { once: true });
</script>

<script>
  window.addEventListener('error', (e) => {
    // surfaces script execution errors across browsers
    console.log('[script error]', e.filename || '(inline)', e.message || e.error);
  });
</script>

<script
  src="tikzjax.js"
  onload="console.log('[tikzjax] script executed'); console.log('TikZJax global =', typeof window.TikZJax);"
  onerror="console.error('[tikzjax] failed to load')">
</script>
  
<script>
  console.log('TikZJax global =', typeof window.TikZJax);
  if (typeof window.TikZJax === 'function') window.TikZJax(document);  // initialize if exposed as a function
</script>
  
<script>
(async () => {
  if (!window.TikzJax) { console.error('TikzJax not loaded'); return; }

  // init if available
  if (typeof window.TikzJax.load === 'function') {
    await window.TikzJax.load();
  }

  const resp = await fetch('data.json');
  const { circuit_lines } = await resp.json();

  const tikz = [
    '\\usepackage{circuitikz}',
    '\\begin{document}',
    '\\begin{circuitikz}[american]',
    ...circuit_lines,
    '\\end{circuitikz}',
    '\\end{document}'
  ].join('\n');

  const mount = document.getElementById('tikz-mount');
  mount.innerHTML = '';
  const s = document.createElement('script');
  s.type = 'text/tikz';
  s.textContent = tikz;
  mount.appendChild(s);

  // Only call the method your bundle exposes
  if (typeof window.TikzJax.process === 'function') {
    window.TikzJax.process(mount);
  } else {
    console.warn('TikzJax.process not found');
  }
})();
</script>
  
</body>
</html>
